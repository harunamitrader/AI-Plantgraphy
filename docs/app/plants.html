<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2e7a55">
    <title>図鑑 | AI Plantgraphy</title>
    <link rel="manifest" href="./manifest.webmanifest?v=pages-v14">
    <link rel="icon" href="./static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.png">
    <link rel="stylesheet" href="./static/style.css?v=pages-v14">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html"><img src="./static/brand/ai-plantgraphy-icon.png" alt="" width="32" height="32">AI Plantgraphy</a>
      <nav class="nav">
        <a href="./index.html">ホーム</a>
        <a href="./plants.html" class="is-current">図鑑</a>
        <a href="./observations.html">観察</a>
        <a href="./upload.html">追加</a>
        <a href="./pending-local.html">未送信</a>
        <a href="./review.html">確認待ち</a>
        <a href="./settings.html">設定</a>
      </nav>
    </header>
    <main class="page">
      <section class="page-hero compact-hero">
        <div>
          <p class="eyebrow">Library</p>
          <h1>図鑑</h1>
          <p>接続先PCに保存されている植物図鑑を、この画面からそのまま閲覧できます。</p>
        </div>
      </section>
      <section class="panel offline-banner" id="offlineBanner" hidden></section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Create</p>
            <h2>名前から図鑑を生成</h2>
          </div>
        </div>
        <p>観察がなくても、植物名や学名を入力して図鑑プロフィールを先に作れます。</p>
        <div class="inventory-tools">
          <label for="manualCommonName">植物名</label>
          <input id="manualCommonName" class="search-input" type="text" autocomplete="off" placeholder="例: シクラメン">
        </div>
        <button id="createPlantBtn" class="btn btn-primary" type="button">図鑑を生成する</button>
        <p class="field-help">アプリパスワードとGeminiモデルは <a href="./settings.html">設定</a> で変更できます。学名はAIが推定し、曖昧な場合は作成しません。</p>
        <p id="createPlantStatus" class="action-status"></p>
        <p id="createPlantTimer" class="field-help" hidden>経過 0秒</p>
      </section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Inventory</p>
            <h2>植物一覧</h2>
          </div>
          <span id="plantCount">0 種</span>
        </div>
        <div class="inventory-tools">
          <label for="plantSearch">植物を探す</label>
          <input id="plantSearch" class="search-input" type="search" autocomplete="off" placeholder="名前、学名、特徴、手入れで検索">
        </div>
        <p id="plantsStatus" class="action-status"></p>
        <div class="inventory-grid" id="plantGrid"></div>
        <p class="empty filter-empty" id="plantEmpty" hidden>一致する植物はありません。</p>
      </section>
    </main>

    <script src="./static/view-cache.js?v=pages-v14" defer></script>
    <script src="./static/app.js?v=pages-v14" defer></script>
    <script>
      window.addEventListener('load', async () => {
        const appConfig = window.AIPlantgraphyApp;
        const status = document.getElementById('plantsStatus');
        const plantGrid = document.getElementById('plantGrid');
        const plantCount = document.getElementById('plantCount');
        const plantSearch = document.getElementById('plantSearch');
        const plantEmpty = document.getElementById('plantEmpty');
        const createPlantBtn = document.getElementById('createPlantBtn');
        const createPlantTimer = document.getElementById('createPlantTimer');
        const offlineBanner = document.getElementById('offlineBanner');
        const viewCache = window.AIPlantgraphyViewCache;
        let createPlantInterval = null;
        function setStatus(message, isError = false) {
          status.textContent = message;
          status.className = isError ? 'action-status is-error' : 'action-status';
        }

        function stopCreatePlantTimer() {
          if (createPlantInterval) {
            window.clearInterval(createPlantInterval);
            createPlantInterval = null;
          }
        }

        function startCreatePlantTimer() {
          stopCreatePlantTimer();
          const startedAt = Date.now();
          createPlantTimer.hidden = false;
          createPlantTimer.textContent = '経過 0秒';
          createPlantInterval = window.setInterval(() => {
            const seconds = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
            createPlantTimer.textContent = `経過 ${seconds}秒`;
          }, 1000);
        }

        function renderPlants(plants) {
          plantGrid.innerHTML = '';
          const totalPlants = plants.length;
          plantCount.textContent = `${totalPlants} 種`;
          if (!totalPlants) {
            plantGrid.innerHTML = '<p class="empty">まだ植物は登録されていません。</p>';
            return;
          }
          plants.forEach((plant) => {
            const card = document.createElement('a');
            card.className = 'plant-card';
            card.href = `./plant.html?id=${encodeURIComponent(plant.id)}`;
            card.dataset.searchText = `${plant.display_name || ''} ${plant.scientific_name || ''} ${plant.basic_profile_text || ''} ${plant.visual_appeal_text || ''} ${plant.care_notes || ''} ${(plant.profile_generation_progress || {}).label || ''} ${(plant.profile_generation_progress || {}).error_message || ''}`.toLowerCase();
            const imageHtml = plant.representative_image_url
              ? `<img src="${appConfig.resolveServerUrl(plant.representative_image_url)}" alt="${escapeHtml(plant.display_name || '植物')}">`
              : '';
            const progress = plant.profile_generation_progress || {};
            const statusClass = progress.phase === 'analysis_failed' ? 'danger' : progress.phase === 'queued' || progress.phase === 'analyzing' ? 'accent' : '';
            const statusLabel = progress.phase === 'queued' || progress.phase === 'analyzing' || progress.phase === 'analysis_failed'
              ? progress.label || '図鑑'
              : '図鑑';
            card.innerHTML = `
              ${imageHtml}
              <div class="plant-card-body">
                <span class="status-pill ${statusClass}">${escapeHtml(statusLabel)}</span>
                <h3>${escapeHtml(plant.display_name || '名称未設定')}</h3>
                <p>${escapeHtml(plant.scientific_name || '学名未確定')}</p>
              </div>
            `;
            plantGrid.appendChild(card);
          });

          const cards = Array.from(document.querySelectorAll('.plant-card'));
          plantSearch.addEventListener('input', () => {
            const terms = plantSearch.value.trim().toLowerCase().split(/\s+/).filter(Boolean);
            let visibleCount = 0;
            cards.forEach((card) => {
              const text = card.dataset.searchText || '';
              const isVisible = terms.every((term) => text.includes(term));
              card.hidden = !isVisible;
              if (isVisible) {
                visibleCount += 1;
              }
            });
            plantCount.textContent = terms.length ? `${visibleCount} / ${totalPlants} 種` : `${totalPlants} 種`;
            plantEmpty.hidden = visibleCount !== 0;
          });
        }

        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
        }

        async function createPlantFromName() {
          const apiKey = (appConfig.getStoredPassword() || '').trim();
          if (!apiKey) {
            setStatus('設定ページでアプリパスワードを保存してください。', true);
            const target = document.getElementById('createPlantStatus');
            target.textContent = '設定ページでアプリパスワードを保存してください。';
            target.className = 'action-status is-error';
            return;
          }

          const commonName = document.getElementById('manualCommonName').value.trim();
          const statusTarget = document.getElementById('createPlantStatus');
          if (!commonName) {
            statusTarget.textContent = '植物名を入力してください。';
            statusTarget.className = 'action-status is-error';
            return;
          }

          createPlantBtn.disabled = true;
          statusTarget.textContent = '図鑑を生成しています...';
          statusTarget.className = 'action-status';
          startCreatePlantTimer();
          try {
            const formData = new FormData();
            formData.append('common_name_ja', commonName);
            formData.append('gemini_model', appConfig.getStoredGeminiModel() || '');
            const response = await fetch(appConfig.apiUrl('/api/plants'), {
              method: 'POST',
              headers: {
                'X-Plant-Dex-Api-Key': apiKey,
              },
              body: formData,
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
              throw new Error(payload.detail || '図鑑の生成に失敗しました。');
            }
            stopCreatePlantTimer();
            if (payload?.status === 'exists' && payload?.plant?.id) {
              statusTarget.textContent = payload.detail || '既存の図鑑があります。詳細ページへ移動します。';
              statusTarget.className = 'action-status is-success';
              createPlantTimer.hidden = true;
              window.setTimeout(() => {
                window.location.href = `./plant.html?id=${encodeURIComponent(payload.plant.id)}`;
              }, 500);
              return;
            }
            statusTarget.textContent = '図鑑を生成しました。詳細ページへ移動します。';
            statusTarget.className = 'action-status is-success';
            createPlantTimer.hidden = false;
            createPlantTimer.textContent = `完了 ${typeof payload?.seconds === 'number' ? payload.seconds : '?'}秒`;
            if (payload?.plant?.id) {
              window.setTimeout(() => {
                window.location.href = `./plant.html?id=${encodeURIComponent(payload.plant.id)}`;
              }, 400);
            }
          } catch (error) {
            stopCreatePlantTimer();
            statusTarget.textContent = `エラー: ${error.message}`;
            statusTarget.className = 'action-status is-error';
            createPlantTimer.hidden = true;
          } finally {
            createPlantBtn.disabled = false;
          }
        }

        if (!appConfig || !appConfig.getApiBaseUrl()) {
          appConfig && appConfig.showOfflineBanner(offlineBanner, '先に設定ページで自分のPCの接続先URLを保存してください。');
          setStatus('先に設定ページで自分のPCの接続先URLを保存してください。', true);
          return;
        }

        setStatus('植物図鑑を読み込んでいます...');
        try {
          const data = await appConfig.fetchJson('/api/plants', { cache: 'no-store' });
          viewCache && await viewCache.saveIndex('plants', data).catch(() => null);
          appConfig.hideOfflineBanner(offlineBanner);
          renderPlants(data.plants || []);
          setStatus('');
        } catch (error) {
          const cached = viewCache ? await viewCache.loadIndex('plants').catch(() => null) : null;
          if (cached?.payload?.plants) {
            renderPlants(cached.payload.plants || []);
            appConfig.showOfflineBanner(offlineBanner, viewCache.offlineMessage('保存済みの図鑑を表示しています。', cached.savedAt));
            setStatus('保存済みの図鑑を表示しています。');
            return;
          }
          appConfig.showOfflineBanner(offlineBanner, 'このページはまだオフライン保存されていません。');
          setStatus('このページはまだオフライン保存されていません。', true);
        }

        createPlantBtn.addEventListener('click', createPlantFromName);
      });
    </script>
  </body>
</html>
