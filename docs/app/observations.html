<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2e7a55">
    <title>観察記録 | AI Plantgraphy</title>
    <link rel="manifest" href="./manifest.webmanifest?v=pages-v14">
    <link rel="icon" href="./static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.png">
    <link rel="stylesheet" href="./static/style.css?v=pages-v14">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html"><img src="./static/brand/ai-plantgraphy-icon.png" alt="" width="32" height="32">AI Plantgraphy</a>
      <nav class="nav">
        <a href="./index.html">ホーム</a>
        <a href="./plants.html">図鑑</a>
        <a href="./observations.html" class="is-current">観察</a>
        <a href="./upload.html">追加</a>
        <a href="./pending-local.html">未送信</a>
        <a href="./review.html">確認待ち</a>
        <a href="./settings.html">設定</a>
      </nav>
    </header>
    <main class="page">
      <section class="page-hero compact-hero">
        <div>
          <p class="eyebrow">Observation log</p>
          <h1>観察記録</h1>
          <p>接続先PCに保存されている観察記録を、この画面から一覧と詳細で確認できます。</p>
        </div>
      </section>
      <section class="panel offline-banner" id="offlineBanner" hidden></section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Records</p>
            <h2>すべての観察</h2>
          </div>
          <span id="recordCount">0 件</span>
        </div>
        <div class="inventory-tools">
          <label for="recordSearch">観察記録を探す</label>
          <input id="recordSearch" class="search-input" type="search" autocomplete="off" placeholder="名前、学名、場所、メモで検索">
        </div>
        <p id="observationsStatus" class="action-status"></p>
        <div class="record-list" id="recordList"></div>
        <p class="empty filter-empty" id="recordEmpty" hidden>一致する観察記録はありません。</p>
      </section>
    </main>

    <script src="./static/view-cache.js?v=pages-v14" defer></script>
    <script src="./static/app.js?v=pages-v14" defer></script>
    <script>
      window.addEventListener('load', async () => {
        const appConfig = window.AIPlantgraphyApp;
        const status = document.getElementById('observationsStatus');
        const recordList = document.getElementById('recordList');
        const recordCount = document.getElementById('recordCount');
        const recordSearch = document.getElementById('recordSearch');
        const recordEmpty = document.getElementById('recordEmpty');
        const offlineBanner = document.getElementById('offlineBanner');
        const viewCache = window.AIPlantgraphyViewCache;
        function setStatus(message, isError = false) {
          status.textContent = message;
          status.className = isError ? 'action-status is-error' : 'action-status';
        }

        function renderObservations(observations) {
          recordList.innerHTML = '';
          const totalRecords = observations.length;
          recordCount.textContent = `${totalRecords} 件`;
          if (!totalRecords) {
            recordList.innerHTML = '<p class="empty">観察記録はまだありません。</p>';
            return;
          }
          observations.forEach((observation) => {
            const card = document.createElement('a');
            card.className = 'record-card';
            card.href = `./observation.html?id=${encodeURIComponent(observation.id)}`;
            card.dataset.searchText = `${observation.display_name || ''} ${observation.analysis?.scientific_name || ''} ${observation.note || ''} ${observation.location_label || ''} ${observation.status_label || ''}`.toLowerCase();
            const firstImage = Array.isArray(observation.image_urls) && observation.image_urls.length ? observation.image_urls[0] : '';
            const imageHtml = firstImage
              ? `<img src="${appConfig.resolveServerUrl(firstImage)}" alt="${escapeHtml(observation.display_name || '観察記録')}">`
              : '';
            const meta2 = (observation.location_label || observation.note)
              ? `<small>${escapeHtml(observation.location_label || '場所未入力')} / ${escapeHtml(observation.note || 'メモなし')}</small>`
              : '';
            card.innerHTML = `
              ${imageHtml}
              <div>
                <span class="status-pill">${escapeHtml(observation.status_label || '不明')}</span>
                <h3>${escapeHtml(observation.display_name || '解析待ち')}</h3>
                <p>${escapeHtml(observation.analysis?.scientific_name || '学名未確定')}</p>
                <small>${escapeHtml(observation.observed_label || '未入力')} / 信頼度 ${escapeHtml(observation.confidence_percent || '不明')}</small>
                ${meta2}
              </div>
            `;
            recordList.appendChild(card);
          });

          const cards = Array.from(document.querySelectorAll('.record-card'));
          recordSearch.addEventListener('input', () => {
            const terms = recordSearch.value.trim().toLowerCase().split(/\s+/).filter(Boolean);
            let visibleCount = 0;
            cards.forEach((card) => {
              const text = card.dataset.searchText || '';
              const isVisible = terms.every((term) => text.includes(term));
              card.hidden = !isVisible;
              if (isVisible) {
                visibleCount += 1;
              }
            });
            recordCount.textContent = terms.length ? `${visibleCount} / ${totalRecords} 件` : `${totalRecords} 件`;
            recordEmpty.hidden = visibleCount !== 0;
          });
        }

        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
        }

        if (!appConfig || !appConfig.getApiBaseUrl()) {
          appConfig && appConfig.showOfflineBanner(offlineBanner, '先に設定ページで自分のPCの接続先URLを保存してください。');
          setStatus('先に設定ページで自分のPCの接続先URLを保存してください。', true);
          return;
        }

        setStatus('観察記録を読み込んでいます...');
        try {
          const data = await appConfig.fetchJson('/api/observations', { cache: 'no-store' });
          viewCache && await viewCache.saveIndex('observations', data).catch(() => null);
          appConfig.hideOfflineBanner(offlineBanner);
          renderObservations(data.observations || []);
          setStatus('');
        } catch (error) {
          const cached = viewCache ? await viewCache.loadIndex('observations').catch(() => null) : null;
          if (cached?.payload?.observations) {
            renderObservations(cached.payload.observations || []);
            appConfig.showOfflineBanner(offlineBanner, viewCache.offlineMessage('保存済みの観察一覧を表示しています。', cached.savedAt));
            setStatus('保存済みの観察一覧を表示しています。');
            return;
          }
          appConfig.showOfflineBanner(offlineBanner, 'このページはまだオフライン保存されていません。');
          setStatus('このページはまだオフライン保存されていません。', true);
        }
      });
    </script>
  </body>
</html>
