<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2e7a55">
    <title>観察詳細 | AI Plantgraphy</title>
    <link rel="manifest" href="./manifest.webmanifest?v=pages-v3">
    <link rel="icon" href="./static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.png">
    <link rel="stylesheet" href="./static/style.css?v=pages-v3">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html"><img src="./static/brand/ai-plantgraphy-icon.png" alt="" width="32" height="32">AI Plantgraphy</a>
      <nav class="nav">
        <a href="./index.html">ホーム</a>
        <a href="./plants.html">図鑑</a>
        <a href="./observations.html" class="is-current">観察</a>
        <a href="./upload.html">追加</a>
        <a href="./pending-local.html">未送信</a>
        <a href="./review.html">確認待ち</a>
        <a href="./settings.html">設定</a>
      </nav>
    </header>
    <main class="page">
      <section class="observation-hero">
        <div>
          <p class="eyebrow">Observation</p>
          <h1 id="observationName">観察記録を読み込み中...</h1>
          <p id="observationScientificName">学名未確定</p>
          <div class="hero-actions">
            <span class="status-pill" id="observationStatusPill">読込中</span>
            <span class="status-pill accent" id="observationConfidencePill">信頼度 不明</span>
            <a class="btn btn-secondary" id="observationOnlineLink" href="./settings.html">PC側の観察ページ</a>
            <a class="btn btn-secondary" id="observationPlantLink" href="./plants.html" hidden>図鑑で見る</a>
          </div>
        </div>
      </section>

      <section class="photo-strip panel" id="observationPhotoStrip"></section>

      <section class="facts">
        <div><span>状態</span><strong id="factStatus">不明</strong></div>
        <div><span>信頼度</span><strong id="factConfidence">不明</strong></div>
        <div><span>撮影日</span><strong id="factObserved">未入力</strong></div>
        <div><span>場所</span><strong id="factLocation">未入力</strong></div>
        <div><span>メモ</span><strong id="factNote">なし</strong></div>
        <div><span>Geminiモデル</span><strong id="factGeminiModel">記録なし</strong></div>
      </section>

      <section class="analysis-layout">
        <div class="panel">
          <div class="section-title flush">
            <div>
              <p class="eyebrow">Identity</p>
              <h2>解析結果</h2>
            </div>
          </div>
          <div class="result-main">
            <span class="status-pill accent" id="resultConfidencePill">不明</span>
            <h3 id="resultName">名称未確定</h3>
            <p id="resultScientificName">学名未確定</p>
          </div>
        </div>

        <div class="panel">
          <div class="section-title flush">
            <div>
              <p class="eyebrow">Candidates</p>
              <h2>候補</h2>
            </div>
          </div>
          <div class="candidate-list" id="candidateList"></div>
        </div>
      </section>

      <section class="insight-grid">
        <div class="panel">
          <p class="eyebrow">Features</p>
          <h2>見えている特徴</h2>
          <ul class="tag-list" id="featureList"></ul>
        </div>
        <div class="panel">
          <p class="eyebrow">Notes</p>
          <h2>不確実な点</h2>
          <p id="uncertaintyNotes">不確実な点はありません。</p>
        </div>
      </section>

      <details class="raw-json">
        <summary>解析JSONを表示</summary>
        <pre id="rawJsonPre"></pre>
      </details>

      <p id="observationStatusText" class="action-status"></p>

      <div class="image-modal" id="imageModal" aria-hidden="true">
        <div class="image-modal-backdrop" data-close-modal></div>
        <div class="image-modal-dialog" role="dialog" aria-modal="true" aria-label="観察写真の拡大表示">
          <button class="image-modal-close" type="button" data-close-modal>閉じる</button>
          <img id="modalImage" src="" alt="">
        </div>
      </div>
    </main>

    <script src="./static/app.js?v=pages-v3" defer></script>
    <script>
      window.addEventListener('load', async () => {
        const appConfig = window.AIPlantgraphyApp;
        const observationId = new URLSearchParams(window.location.search).get('id') || '';
        const status = document.getElementById('observationStatusText');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');

        function setStatus(message, isError = false) {
          status.textContent = message;
          status.className = isError ? 'action-status is-error' : 'action-status';
        }

        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
        }

        function openImage(src, alt) {
          modalImage.src = src;
          modalImage.alt = alt || '観察写真';
          imageModal.classList.add('is-open');
          imageModal.setAttribute('aria-hidden', 'false');
          document.body.classList.add('modal-open');
        }

        function closeImage() {
          imageModal.classList.remove('is-open');
          imageModal.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('modal-open');
          modalImage.src = '';
        }

        document.querySelectorAll('[data-close-modal]').forEach((button) => button.addEventListener('click', closeImage));
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && imageModal.classList.contains('is-open')) {
            closeImage();
          }
        });

        if (!appConfig || !appConfig.getApiBaseUrl()) {
          document.getElementById('observationName').textContent = '接続先未設定';
          setStatus('先に設定ページで自分のPCの接続先URLを保存してください。', true);
          return;
        }
        if (!observationId) {
          document.getElementById('observationName').textContent = '観察IDがありません';
          setStatus('一覧から観察記録を選び直してください。', true);
          return;
        }

        document.getElementById('observationOnlineLink').href = appConfig.observationUrl(observationId);
        setStatus('観察記録を読み込んでいます...');

        try {
          const observation = await appConfig.fetchJson(`/api/observations/${encodeURIComponent(observationId)}`, { cache: 'no-store' });
          const analysis = observation.analysis || {};

          document.getElementById('observationName').textContent = observation.display_name || '解析待ち';
          document.getElementById('observationScientificName').textContent = analysis.scientific_name || '学名未確定';
          document.getElementById('observationStatusPill').textContent = observation.status_label || '不明';
          document.getElementById('observationConfidencePill').textContent = `信頼度 ${observation.confidence_percent || '不明'}`;
          document.getElementById('factStatus').textContent = observation.status_label || '不明';
          document.getElementById('factConfidence').textContent = observation.confidence_percent || '不明';
          document.getElementById('factObserved').textContent = observation.observed_label || '未入力';
          document.getElementById('factLocation').textContent = observation.location_label || '未入力';
          document.getElementById('factNote').textContent = observation.note || 'なし';
          document.getElementById('factGeminiModel').textContent = analysis.gemini_model || '記録なし';
          document.getElementById('resultConfidencePill').textContent = observation.confidence_percent || '不明';
          document.getElementById('resultName').textContent = analysis.common_name_ja || observation.display_name || '名称未確定';
          document.getElementById('resultScientificName').textContent = analysis.scientific_name || '学名未確定';
          document.getElementById('uncertaintyNotes').textContent = analysis.uncertainty_notes || '不確実な点はありません。';
          document.getElementById('rawJsonPre').textContent = observation.raw_result_json || '';

          const plantLink = document.getElementById('observationPlantLink');
          if (observation.plant_id) {
            plantLink.hidden = false;
            plantLink.href = `./plant.html?id=${encodeURIComponent(observation.plant_id)}`;
          }

          const photoStrip = document.getElementById('observationPhotoStrip');
          photoStrip.innerHTML = '';
          (observation.image_urls || []).forEach((url, index) => {
            const resolvedUrl = appConfig.resolveServerUrl(url);
            const button = document.createElement('button');
            button.className = 'photo-button';
            button.type = 'button';
            button.innerHTML = `<img src="${escapeHtml(resolvedUrl)}" alt="${escapeHtml(`観察写真 ${index + 1}`)}">`;
            button.addEventListener('click', () => openImage(resolvedUrl, `観察写真 ${index + 1}`));
            photoStrip.appendChild(button);
          });

          const candidateList = document.getElementById('candidateList');
          const candidates = analysis.candidates || [];
          candidateList.innerHTML = '';
          if (!candidates.length) {
            candidateList.innerHTML = '<p class="empty">候補はありません。</p>';
          } else {
            candidates.forEach((candidate) => {
              const item = document.createElement('div');
              item.className = 'candidate-item';
              item.innerHTML = `
                <div>
                  <strong>${escapeHtml(candidate.common_name_ja || candidate.name || '候補名未確定')}</strong>
                  <small>${escapeHtml(candidate.scientific_name || '学名未確定')}</small>
                </div>
                <span>${typeof candidate.confidence === 'number' ? Math.round(candidate.confidence * 100) : '?'}%</span>
                <p>${escapeHtml(candidate.reason || '')}</p>
              `;
              candidateList.appendChild(item);
            });
          }

          const featureList = document.getElementById('featureList');
          featureList.innerHTML = '';
          const features = analysis.visible_features || [];
          if (!features.length) {
            featureList.innerHTML = '<li>特徴メモなし</li>';
          } else {
            features.forEach((feature) => {
              const li = document.createElement('li');
              li.textContent = feature;
              featureList.appendChild(li);
            });
          }

          setStatus('');
        } catch (error) {
          document.getElementById('observationName').textContent = '読み込み失敗';
          setStatus(`観察記録を読み込めませんでした: ${error.message}`, true);
        }
      });
    </script>
  </body>
</html>
