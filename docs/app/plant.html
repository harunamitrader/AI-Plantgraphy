<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2e7a55">
    <title>植物詳細 | AI Plantgraphy</title>
    <link rel="manifest" href="./manifest.webmanifest?v=pages-v3">
    <link rel="icon" href="./static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.png">
    <link rel="stylesheet" href="./static/style.css?v=pages-v3">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html"><img src="./static/brand/ai-plantgraphy-icon.png" alt="" width="32" height="32">AI Plantgraphy</a>
      <nav class="nav">
        <a href="./index.html">ホーム</a>
        <a href="./plants.html" class="is-current">図鑑</a>
        <a href="./observations.html">観察</a>
        <a href="./upload.html">追加</a>
        <a href="./pending-local.html">未送信</a>
        <a href="./review.html">確認待ち</a>
        <a href="./settings.html">設定</a>
      </nav>
    </header>
    <main class="page">
      <section class="page-hero compact-hero">
        <div>
          <p class="eyebrow">Plant</p>
          <h1 id="plantName">植物を読み込み中...</h1>
          <p id="plantScientificName">学名未確定</p>
          <p class="field-help">図鑑情報は接続先PCのデータをこの画面に読み込んで表示しています。</p>
        </div>
      </section>

      <section class="photo-strip panel" id="plantPhotoStrip"></section>

      <section class="insight-grid">
        <div class="panel">
          <p class="eyebrow">Profile</p>
          <h2>基本的な特徴</h2>
          <p id="plantProfileText">読み込み中...</p>
        </div>
        <div class="panel">
          <p class="eyebrow">Appearance</p>
          <h2>見た目の特徴と魅力</h2>
          <p id="plantAppearanceText">読み込み中...</p>
        </div>
        <div class="panel">
          <p class="eyebrow">Care</p>
          <h2>手入れメモ</h2>
          <p id="plantCareText">読み込み中...</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Timeline</p>
            <h2>観察履歴</h2>
          </div>
          <span id="plantObservationCount">0 件</span>
        </div>
        <p id="plantStatus" class="action-status"></p>
        <div class="activity-list" id="plantObservationList"></div>
      </section>

      <div class="image-modal" id="imageModal" aria-hidden="true">
        <div class="image-modal-backdrop" data-close-modal></div>
        <div class="image-modal-dialog" role="dialog" aria-modal="true" aria-label="植物写真の拡大表示">
          <button class="image-modal-close" type="button" data-close-modal>閉じる</button>
          <img id="modalImage" src="" alt="">
        </div>
      </div>
    </main>

    <script src="./static/app.js?v=pages-v3" defer></script>
    <script>
      window.addEventListener('load', async () => {
        const appConfig = window.AIPlantgraphyApp;
        const plantId = new URLSearchParams(window.location.search).get('id') || '';
        const status = document.getElementById('plantStatus');
        const plantName = document.getElementById('plantName');
        const plantScientificName = document.getElementById('plantScientificName');
        const plantProfileText = document.getElementById('plantProfileText');
        const plantAppearanceText = document.getElementById('plantAppearanceText');
        const plantCareText = document.getElementById('plantCareText');
        const plantObservationCount = document.getElementById('plantObservationCount');
        const plantObservationList = document.getElementById('plantObservationList');
        const plantPhotoStrip = document.getElementById('plantPhotoStrip');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');

        function setStatus(message, isError = false) {
          status.textContent = message;
          status.className = isError ? 'action-status is-error' : 'action-status';
        }

        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
        }

        function openImage(src, alt) {
          modalImage.src = src;
          modalImage.alt = alt || '植物写真';
          imageModal.classList.add('is-open');
          imageModal.setAttribute('aria-hidden', 'false');
          document.body.classList.add('modal-open');
        }

        function closeImage() {
          imageModal.classList.remove('is-open');
          imageModal.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('modal-open');
          modalImage.src = '';
        }

        document.querySelectorAll('[data-close-modal]').forEach((button) => button.addEventListener('click', closeImage));
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && imageModal.classList.contains('is-open')) {
            closeImage();
          }
        });

        if (!appConfig || !appConfig.getApiBaseUrl()) {
          plantName.textContent = '接続先未設定';
          setStatus('先に設定ページで自分のPCの接続先URLを保存してください。', true);
          return;
        }
        if (!plantId) {
          plantName.textContent = '植物IDがありません';
          setStatus('一覧から植物を選び直してください。', true);
          return;
        }

        setStatus('植物情報を読み込んでいます...');

        try {
          const data = await appConfig.fetchJson(`/api/plants/${encodeURIComponent(plantId)}`, { cache: 'no-store' });
          const plant = data.plant || {};
          const observations = data.observations || [];
          const photoUrls = data.photo_urls || [];

          plantName.textContent = plant.display_name || '名称未設定';
          plantScientificName.textContent = plant.scientific_name || '学名未確定';
          plantProfileText.textContent = plant.basic_profile_display || '基本的な特徴はまだありません。';
          plantAppearanceText.textContent = plant.visual_appeal_display || '見た目の特徴と魅力はまだありません。';
          plantCareText.textContent = plant.care_notes_display || '手入れメモはまだありません。';

          plantPhotoStrip.innerHTML = '';
          photoUrls.forEach((url, index) => {
            const resolvedUrl = appConfig.resolveServerUrl(url);
            const button = document.createElement('button');
            button.className = 'photo-button';
            button.type = 'button';
            button.innerHTML = `<img src="${escapeHtml(resolvedUrl)}" alt="${escapeHtml(`${plant.display_name || '植物'} 写真 ${index + 1}`)}">`;
            button.addEventListener('click', () => openImage(resolvedUrl, `${plant.display_name || '植物'} 写真 ${index + 1}`));
            plantPhotoStrip.appendChild(button);
          });

          plantObservationList.innerHTML = '';
          plantObservationCount.textContent = `${observations.length} 件`;
          observations.forEach((observation) => {
            const row = document.createElement('a');
            row.className = 'activity-row';
            row.href = `./observation.html?id=${encodeURIComponent(observation.id)}`;
            const firstImage = Array.isArray(observation.image_urls) && observation.image_urls.length ? observation.image_urls[0] : '';
            const firstImageUrl = firstImage ? appConfig.resolveServerUrl(firstImage) : '';
            row.innerHTML = `
              ${firstImageUrl ? `<img src="${escapeHtml(firstImageUrl)}" alt="${escapeHtml(plant.display_name || '植物')}">` : ''}
              <div>
                <span>${escapeHtml(observation.observed_label || '未入力')}</span>
                <small>${escapeHtml(observation.status_label || '不明')} / 信頼度 ${escapeHtml(observation.confidence_percent || '不明')}</small>
              </div>
            `;
            plantObservationList.appendChild(row);
          });

          if (!observations.length) {
            plantObservationList.innerHTML = '<p class="empty">観察履歴はまだありません。</p>';
          }

          setStatus('');
        } catch (error) {
          plantName.textContent = '読み込み失敗';
          setStatus(`植物情報を読み込めませんでした: ${error.message}`, true);
        }
      });
    </script>
  </body>
</html>
