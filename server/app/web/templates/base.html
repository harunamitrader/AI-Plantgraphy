<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2e7a55">
    <title>{% block title %}AI Plantgraphy{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/style.css?v=20260426-offline-drafts">
  </head>
  <body>
    {% set current_path = request.url.path %}
    <header class="site-header">
      <a class="brand" href="/"><img src="/static/brand/ai-plantgraphy-icon.png" alt="" width="32" height="32">AI Plantgraphy</a>
      <nav class="nav">
        <a href="/" class="{% if current_path == '/' %}is-current{% endif %}">ホーム</a>
        <a href="/plants" class="{% if current_path == '/plants' or current_path.startswith('/plants/') %}is-current{% endif %}">図鑑</a>
        <a href="/observations" class="{% if current_path == '/observations' or current_path.startswith('/observations/') %}is-current{% endif %}">観察</a>
        <a href="/upload" class="{% if current_path == '/upload' %}is-current{% endif %}">追加</a>
        <a href="/pending-local" class="{% if current_path == '/pending-local' %}is-current{% endif %}">未送信</a>
        <a href="/review" class="{% if current_path == '/review' %}is-current{% endif %}">確認待ち</a>
        <a href="/settings" class="{% if current_path == '/settings' %}is-current{% endif %}">設定</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script src="/static/offline-drafts.js" defer></script>
    <script src="/static/app.js" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
